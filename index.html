<style>
    /* --- Projects Section Container --- */
    #projects {
        padding: 60px 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    .section-intro {
        text-align: center;
        color: #a0aec0;
        font-size: 1.1rem;
        margin-bottom: 40px;
    }

    /* --- The Grid Layout --- */
    .projects-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
        gap: 30px;
        align-items: stretch;
    }

    /* --- Project Cards (Matching your dark/glass theme) --- */
    .project-card {
        background-color: #1a202c; /* Deep dark slate background */
        border: 1px solid #2d3748; /* Subtle border outline */
        border-radius: 12px;
        padding: 25px;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
    }

    /* Hover Effect from your original vibe */
    .project-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.25);
        border-color: #4a5568;
    }

    /* --- Typography Inside Cards --- */
    .project-card h3 {
        color: #ffffff;
        font-size: 1.4rem;
        margin: 10px 0 5px 0;
        font-weight: 600;
    }

    .project-meta {
        font-size: 0.85rem;
        color: #718096; /* Slate gray text */
        margin-bottom: 15px;
        border-bottom: 1px solid #2d3748;
        padding-bottom: 10px;
    }

    .project-card h4 {
        color: #cbd5e0;
        font-size: 1rem;
        margin: 15px 0 5px 0;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    .project-card p, .project-card ul {
        color: #a0aec0; /* Highly readable body text */
        font-size: 0.95rem;
        line-height: 1.6;
        margin-bottom: 10px;
    }

    .project-card ul {
        padding-left: 20px;
    }

    .project-card li {
        margin-bottom: 8px;
    }

    /* Inline Code Snippets font styling */
    .project-card code {
        background-color: #2d3748;
        color: #e2e8f0;
        padding: 2px 6px;
        border-radius: 4px;
        font-family: 'Courier New', Courier, monospace;
        font-size: 0.85rem;
    }

    /* --- Colored Category Tags --- */
    .project-tag {
        align-self: flex-start;
        background-color: rgba(66, 153, 225, 0.15); /* Light translucent blue tint */
        color: #63b3ed; /* Electric blue text */
        padding: 4px 12px;
        border-radius: 20px;
        font-size: 0.75rem;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
    }

    /* Video specific tag color modification to stand out */
    .video-card .project-tag {
        background-color: rgba(72, 187, 120, 0.15); /* Green tint */
        color: #48bb78; /* Green text */
    }

    /* Blue Accent border highlight for text projects */
    .project-card:not(.video-card) {
        border-top: 3px solid #3182ce;
    }

    /* Green Accent border highlight for video projects */
    .video-card {
        border-top: 3px solid #38a169;
    }

    /* --- Media Layout (Images & Videos) --- */
    .project-media {
        margin-top: 20px;
        margin-bottom: 20px;
        border-radius: 8px;
        overflow: hidden;
    }

    .project-img {
        width: 100%;
        height: auto;
        display: block;
        border: 1px solid #2d3748;
        border-radius: 8px;
    }

    /* Video Containers */
    .video-placeholder {
        background-color: #111622;
        border: 2px dashed #2d3748;
        padding: 50px 20px;
        text-align: center;
        border-radius: 8px;
        color: #718096;
        font-weight: 500;
    }

    /* --- Buttons --- */
    .project-links {
        margin-top: auto; /* Pushes button to the very bottom of the card */
        padding-top: 15px;
    }

    .project-link {
        display: inline-block;
        width: 100%;
        text-align: center;
        background-color: #3182ce;
        color: #ffffff;
        padding: 10px 0;
        border-radius: 6px;
        font-weight: 600;
        text-decoration: none;
        transition: background-color 0.2s ease;
    }

    .project-link:hover {
        background-color: #2b6cb0;
    }
</style>
